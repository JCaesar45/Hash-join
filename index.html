<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELOCITY • HASHJOIN</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <nav>
    <div class="logo">VELOCITY<span class="gold">.</span></div>
  </nav>

  <header class="hero">
    <div class="hero-content">
      <h1>HASH<span class="gold">JOIN</span></h1>
      <p>Elegant • Performant • Luxurious</p>
      <button onclick="document.getElementById('demo').scrollIntoView({ behavior: 'smooth' })" class="cta">
        EXPERIENCE THE DEMO
      </button>
    </div>
  </header>

  <section id="demo" class="demo-section">
    <h2>LIVE INTERACTIVE HASH JOIN</h2>

    <div class="demo-grid">
      <div>
        <h3>TABLE A — Employees</h3>
        <textarea id="tableA" class="data-input">{"age":27,"name":"Jonah"}
{"age":18,"name":"Alan"}
{"age":28,"name":"Glory"}
{"age":18,"name":"Popeye"}
{"age":28,"name":"Alan"}</textarea>
      </div>
      <div>
        <h3>TABLE B — Nemesis</h3>
        <textarea id="tableB" class="data-input">{"character":"Jonah","nemesis":"Whales"}
{"character":"Jonah","nemesis":"Spiders"}
{"character":"Alan","nemesis":"Ghosts"}
{"character":"Alan","nemesis":"Zombies"}
{"character":"Glory","nemesis":"Buffy"}</textarea>
      </div>
    </div>

    <div class="controls">
      <button onclick="runDemo()" class="execute-btn">EXECUTE HASH JOIN →</button>
      <button onclick="resetDemo()" class="reset-btn">RESET</button>
    </div>

    <div id="result" class="result-panel"></div>
  </section>

  <script>
    function hashJoin(A, B) {
      const MB = new Map();
      for (let b of B) {
        const key = b.character;
        if (!MB.has(key)) MB.set(key, []);
        MB.get(key).push(b);
      }
      const C = [];
      for (let a of A) {
        const key = a.name;
        if (MB.has(key)) {
          for (let b of MB.get(key)) {
            C.push({
              A_age: a.age,
              A_name: a.name,
              B_character: b.character,
              B_nemesis: b.nemesis
            });
          }
        }
      }
      return C;
    }

    function runDemo() {
      const rawA = document.getElementById('tableA').value.trim().split('\n');
      const rawB = document.getElementById('tableB').value.trim().split('\n');
      const A = rawA.map(line => {
        try {
          return JSON.parse(line.trim());
        } catch (e) {
          return null;
        }
      }).filter(Boolean);
      const B = rawB.map(line => {
        try {
          return JSON.parse(line.trim());
        } catch (e) {
          return null;
        }
      }).filter(Boolean);
      const result = hashJoin(A, B);
      let html = `
                <h3 style="color:#d4af37">✅ HASH JOIN COMPLETE — ${result.length} MATCHES</h3>
                <table>
                    <thead>
                        <tr><th>A_age</th><th>A_name</th><th>B_character</th><th>B_nemesis</th></tr>
                    </thead>
                    <tbody>`;
      result.forEach(row => {
        html += `<tr>
                    <td>${row.A_age}</td>
                    <td>${row.A_name}</td>
                    <td>${row.B_character}</td>
                    <td>${row.B_nemesis}</td>
                </tr>`;
      });
      html += `</tbody></table>`;
      document.getElementById('result').innerHTML = html;
    }

    function resetDemo() {
      document.getElementById('result').innerHTML = '<p style="color:#888;text-align:center;padding:40px;">Run the join to see results...</p>';
    }
    // Auto demo on load
    window.onload = () => setTimeout(runDemo, 600);
  </script>
</body>

</html>
